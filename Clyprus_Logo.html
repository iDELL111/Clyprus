<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Clyprus Logo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    gap: 28px;
  }
  canvas { border-radius: 32px; box-shadow: 0 0 80px #00ccff55, 0 0 200px #00ee8820; }
  h1 { color: #fff; font-size: 2rem; letter-spacing: 8px; font-weight: 300; }
  .btn {
    background: linear-gradient(135deg, #00ffee, #0088ff, #00ee77);
    color: #fff;
    border: none;
    padding: 14px 44px;
    border-radius: 50px;
    font-size: 1.1rem;
    cursor: pointer;
    letter-spacing: 2px;
    font-weight: 600;
    box-shadow: 0 4px 30px #00ccff66;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn:hover { transform: scale(1.05); box-shadow: 0 8px 40px #00ffee88; }
  p { color: #aaa; font-size: 0.9rem; }
</style>
</head>
<body>
<h1>CLYPRUS</h1>
<canvas id="logo" width="1024" height="1024"></canvas>
<button class="btn" onclick="downloadLogo()">⬇ Download PNG (1024×1024)</button>
<p>High Quality • Transparent-ready • App Icon Size</p>

<script>
const canvas = document.getElementById('logo');
const ctx = canvas.getContext('2d');
const W = 1024, H = 1024;

function drawLogo() {
  ctx.clearRect(0, 0, W, H);

  // ── Rounded Square Clip ──
  const r = 220;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(W - r, 0);
  ctx.quadraticCurveTo(W, 0, W, r);
  ctx.lineTo(W, H - r);
  ctx.quadraticCurveTo(W, H, W - r, H);
  ctx.lineTo(r, H);
  ctx.quadraticCurveTo(0, H, 0, H - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.save();
  ctx.clip();

  // ── Background base ──
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#44CCFF');
  bg.addColorStop(0.5, '#22AAFF');
  bg.addColorStop(1, '#3366EE');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // ── Cyan glow top-left ──
  const g1 = ctx.createRadialGradient(220, 250, 0, 220, 250, 520);
  g1.addColorStop(0, 'rgba(0,255,230,0.85)');
  g1.addColorStop(0.5, 'rgba(0,200,255,0.5)');
  g1.addColorStop(1, 'rgba(0,150,255,0)');
  ctx.fillStyle = g1;
  ctx.fillRect(0, 0, W, H);

  // ── Green glow bottom-left ──
  const g2 = ctx.createRadialGradient(100, 880, 0, 100, 880, 500);
  g2.addColorStop(0, 'rgba(0,240,100,0.9)');
  g2.addColorStop(0.4, 'rgba(0,200,120,0.6)');
  g2.addColorStop(1, 'rgba(0,180,200,0)');
  ctx.fillStyle = g2;
  ctx.fillRect(0, 0, W, H);

  // ── Purple glow top-right ──
  const g3 = ctx.createRadialGradient(870, 130, 0, 870, 130, 380);
  g3.addColorStop(0, 'rgba(180,180,255,0.7)');
  g3.addColorStop(0.5, 'rgba(100,130,255,0.3)');
  g3.addColorStop(1, 'rgba(60,100,255,0)');
  ctx.fillStyle = g3;
  ctx.fillRect(0, 0, W, H);

  // ── Cyan glow bottom-right ──
  const g4 = ctx.createRadialGradient(850, 820, 0, 850, 820, 350);
  g4.addColorStop(0, 'rgba(0,230,255,0.55)');
  g4.addColorStop(1, 'rgba(0,150,255,0)');
  ctx.fillStyle = g4;
  ctx.fillRect(0, 0, W, H);

  // ── White center glow ──
  const g5 = ctx.createRadialGradient(512, 480, 0, 512, 480, 400);
  g5.addColorStop(0, 'rgba(255,255,255,0.18)');
  g5.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g5;
  ctx.fillRect(0, 0, W, H);

  // ═══════════════════════════════
  //   WHITE PUSHPIN / MAP PIN ICON
  // ═══════════════════════════════
  ctx.shadowColor = 'rgba(0,40,140,0.4)';
  ctx.shadowBlur = 40;
  ctx.shadowOffsetX = 8;
  ctx.shadowOffsetY = 14;
  ctx.fillStyle = '#FFFFFF';

  // Pin head + body (trapezoid top, rectangular body)
  ctx.beginPath();
  // Top-left of head
  ctx.moveTo(368, 205);
  // Top-right of head
  ctx.lineTo(755, 210);
  // Right shoulder
  ctx.lineTo(798, 280);
  // Right body going down
  ctx.lineTo(798, 558);
  // Inner notch right (start of tail gap)
  ctx.lineTo(668, 558);
  // Go down to arrow tip
  ctx.lineTo(668, 755);
  // Downward point of pin
  ctx.lineTo(590, 845);
  // Back up left side
  ctx.lineTo(510, 755);
  ctx.lineTo(510, 558);
  // Inner notch left
  ctx.lineTo(375, 558);
  // Left shoulder
  ctx.lineTo(330, 470);
  ctx.lineTo(330, 280);
  ctx.closePath();
  ctx.fill();

  // Left arrow / tail
  ctx.beginPath();
  ctx.moveTo(335, 370);
  ctx.lineTo(135, 490);
  ctx.lineTo(335, 615);
  ctx.closePath();
  ctx.fill();

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  // ═══════════════════════════════
  //   GRADIENT "C" ARC
  // ═══════════════════════════════
  // The C is a thick arc on the right, open towards left
  // Outer arc: large circle, inner arc: smaller circle
  const cx = 570, cy = 500;
  const outerR = 298, innerR = 218;
  // Arc from ~320° to ~40° going clockwise (open on the left)
  const startAngle = -1.20; // ~-69° (top-right opening)
  const endAngle   =  1.20; // ~+69° (bottom-right opening)

  ctx.save();
  ctx.shadowColor = 'rgba(0,50,180,0.35)';
  ctx.shadowBlur = 30;
  ctx.shadowOffsetX = 5;
  ctx.shadowOffsetY = 10;

  // C gradient: teal top → blue mid → periwinkle bottom
  const cGrad = ctx.createLinearGradient(cx - outerR, cy - outerR, cx + outerR, cy + outerR);
  cGrad.addColorStop(0,   '#00DD88');
  cGrad.addColorStop(0.3, '#00BBDD');
  cGrad.addColorStop(0.6, '#4499FF');
  cGrad.addColorStop(1,   '#8899EE');
  ctx.fillStyle = cGrad;

  ctx.beginPath();
  // Outer arc (counter-clockwise sweep = false)
  ctx.arc(cx, cy, outerR, startAngle, endAngle, false);
  // Inner arc (clockwise sweep = true)
  ctx.arc(cx, cy, innerR, endAngle, startAngle, true);
  ctx.closePath();
  ctx.fill();

  // Top highlight on C
  const hiGrad = ctx.createLinearGradient(cx, cy - outerR, cx + outerR, cy - outerR * 0.5);
  hiGrad.addColorStop(0, 'rgba(255,255,255,0.25)');
  hiGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hiGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, outerR, startAngle, -0.1, false);
  ctx.arc(cx, cy, innerR, -0.1, startAngle, true);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
  ctx.restore(); // restore clip
}

function downloadLogo() {
  const link = document.createElement('a');
  link.download = 'Clyprus_Logo.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

drawLogo();
</script>
</body>
</html>
